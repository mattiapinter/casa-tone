<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Appartamenti Brigadoi</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,400&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f8fa;color:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:480px;width:100%;text-align:center}
.logo{font-size:42px;margin-bottom:16px}
h1{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:400;color:#0c3b5e;margin-bottom:8px}
.sub{font-size:14px;color:#7a756e;margin-bottom:40px}
.cards{display:flex;flex-direction:column;gap:12px}
.card{display:flex;align-items:center;gap:16px;padding:18px 20px;background:#fff;border:1px solid #dde4e8;border-radius:10px;text-decoration:none;color:#1a1a1a;transition:border-color .15s,box-shadow .15s;}
.card:hover{border-color:#0097a7;box-shadow:0 4px 16px rgba(0,151,167,.12)}
.card-icon{font-size:32px;flex-shrink:0}
.card-body{text-align:left}
.card-name{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:400;color:#0c3b5e}
.card-loc{font-size:12px;color:#7a756e;margin-top:2px}
.card-arr{font-size:18px;color:#0097a7;margin-left:auto;flex-shrink:0}
.foot{margin-top:40px;font-size:12px;color:#aaa}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">⚓</div>
  <h1>Appartamenti Brigadoi</h1>
  <p class="sub">Scegli il tuo appartamento per vedere la guida ospiti.</p>
  <div class="cards">
    <a class="card" href="./casa-tone/">
      <span class="card-icon">⛰️</span>
      <div class="card-body">
        <div class="card-name">Casa Tone</div>
        <div class="card-loc">Predazzo, Val di Fiemme</div>
      </div>
      <span class="card-arr">→</span>
    </a>
    <a class="card" href="./casa-marika/">
      <span class="card-icon">🏖️</span>
      <div class="card-body">
        <div class="card-name">Casa Marika</div>
        <div class="card-loc">Murta Maria, Olbia, Sardegna</div>
      </div>
      <span class="card-arr">→</span>
    </a>
    <a class="card" href="./casa-mattia/" style="opacity:.5;pointer-events:none">
      <span class="card-icon">🌊</span>
      <div class="card-body">
        <div class="card-name">Casa Mattia</div>
        <div class="card-loc">Murta Maria, Olbia, Sardegna — in arrivo</div>
      </div>
      <span class="card-arr">→</span>
    </a>
  </div>
  <p class="foot">Appartamenti Brigadoi · Predazzo &amp; Sardegna</p>
</div>
</body>
</html>
